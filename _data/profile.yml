short_bio: >-
  <p>
  My name is Richard Dong, a Ph.D. student supervised by Dr. Gregory Schwartz in the Department of Medical Biophysics at the University of Toronto, Toronto, Ontario, Canada. 
  I am working on developing machine learning algorithms for live cell imaging analysis.
  I majored in Medical Physics and minored in Biology and Bioinformatics during my undergraduate study at the University of Waterloo, 
  and am excited about how to utilize biological data to answer big questions in biology. 
  </p>
  <p>
  I used to live in Shanghai, China, and moved to Toronto, Canada when I was 14 years old. 
   </p>

